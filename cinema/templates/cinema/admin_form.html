{% extends 'cinema/admin_dashboard.html' %}
{% block admin_content %}
<h2 class="mb-4 text-light">{{ title|default:"Chỉnh sửa" }}</h2>
<form method="post" class="bg-dark p-4 rounded border border-secondary">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="mt-3">
    <button type="submit" class="btn btn-warning me-2">Lưu thay đổi</button>
    <a href="javascript:history.back()" class="btn btn-outline-light">Quay lại</a>
  </div>
</form>
{% endblock %}
